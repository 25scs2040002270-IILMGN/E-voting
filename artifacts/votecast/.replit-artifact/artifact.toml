kind = "web"
previewPath = "/"
title = "VoteCast — College Elections"
version = "1.0.0"
id = "artifacts/votecast"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18912

[services.development]
run = "pnpm --filter @workspace/votecast run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/votecast", "run", "build" ]
publicDir = "artifacts/votecast/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18912"
BASE_PATH = "/"
